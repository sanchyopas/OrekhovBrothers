<div class="popup">
  <button type="button" class="popup__close">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12.75 0.75L0.75 12.75M0.75 0.75L12.75 12.75" stroke="#686868" stroke-width="1.5"
            stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <div class="popup__content">
    <div class="single__images-inner">
      <div class="single__slider swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="@img/single-image.jpg" alt="">
          </div>
          <div class="swiper-slide">
            <div class="swiper-slide">
              <img src="@img/banner.jpg" alt="">
            </div>
          </div>
          <div class="swiper-slide">
            <div class="swiper-slide">
              <img src="@img/single-image.jpg" alt="">
            </div>
          </div>
        </div>
      </div>
      <div class="single__slider-thumb swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <img src="@img/single-image.jpg" alt="">
          </div>
          <div class="swiper-slide">
            <img src="@img/banner.jpg" alt="">
          </div>
          <div class="swiper-slide">
            <img src="@img/single-image.jpg" alt="">
          </div>
        </div>
      </div>
    </div>
  </div>
  <button type="button" class="swiper-button-next ">next</button>
  <button type="button" class="swiper-button-prev">prev</button>
</div>
