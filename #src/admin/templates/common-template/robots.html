{% extends 'admin_base.html' %}{% load static %} {% block body %}
<div class="page">
  <div class="page__content">
    <form action="." method="POST" class="form" enctype="multipart/form-data">
      <div class="header">
        <div class="header__left">
          <h1 class="page__title">Системные настройки</h1>
        </div>
        <div class="header__right">
          <button type="submit" class="btn btn--accent">
            <img src="{% static 'admin/img/save.svg' %}" alt=""/>
            Сохранить
          </button>
        </div>
      </div>
      {% csrf_token %}
      {{ form.media }}
      <div class="form__inner _show" id="basic">
        <div class="form__row">
          <div class="form__col">
            <div class="form__group">
              <label for="{{ form.content.id_for_label }}" class="form__label"> <span>*</span>Контент: </label>
              {{ form.content }} {{ form.content.errors }}
            </div>
          </div>
          <div class="page-content__col">
            <div class="form__group"></div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

{% endblock %}
