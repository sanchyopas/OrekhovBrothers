{% load static %}
{% load image_path %}
<!DOCTYPE html>
<html lang="ru" class="">
<head>
  <title>{% block title %}{% endblock %}</title>
  <meta name="description" content="{% block description %}{% endblock %}">
  <meta name="keywords" content="{% block keywords %}{% endblock %}">
  <link rel="canonical" href="https://{{ request.get_host }}{{ request.path }}">
  <meta charset="UTF-8">
  <meta name="format-detection" content="telephone=no">
  <link rel="shortcut icon"
        href="{% if base_settings.favicon %} {{ base_settings.favicon.url }}{% endif %}">
  <meta name="robots" content="all">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" defer
  />
  <link rel="stylesheet" href="{% static 'theme/css/style.min.css' %}">

</head>

<body>
{% include "./includes/_header.html" %}
<main>
  {% block content %} {% endblock %}
</main>
{% include "./includes/_footer.html" %}
{% include "./includes/_popup.html" %}

<script type="module" src="{% static 'theme/js/app.min.js' %}" defer></script>
</body>

</html>
