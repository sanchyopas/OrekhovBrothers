{% load static %}
{% load thumbnail %}
<article class="product-card">
  <a href="{{ product.get_absolute_url }}" class="product-card__image">
    {% thumbnail product.image "292x249" format="WEBP" crop="center" as im %}
    <img src="{{ im.url }}"
         width="{{ im.width }}"
         height="{{ im.height }}"
         alt="{{ category.name }}"
         title="{{ category.name }}"
    >
    {% endthumbnail %}
  </a>

  <div class="product-card__body">
    <div class="product-card__body-inner">
      <a href="{{ product.get_absolute_url }}" class="product-card__title">{{ product.name }}</a>

      {% if product.description %}
      <p class="product-card__description">
        {{ product.clean_description | striptags | truncatechars:63 }}
      </p>
      {% endif %}
    </div>

    <div class="features">
      <div class="features__item">
        <div class="features__feature-icon">
          <img src="@img/icon/area.svg" alt="">
        </div>
        <p class="features__feature-value">72 м²</p>
      </div>
      <div class="features__item">
        <div class="features__feature-icon">
          <img src="@img/icon/perimetr.svg" alt="">
        </div>
        <p class="features__feature-value">100×200 мм</p>
      </div>
      <div class="features__item">
        <div class="features__feature-icon">
          <img src="@img/icon/stairs.svg" alt="">
        </div>
        <p class="features__feature-value">1 этаж</p>
      </div>
      <div class="features__item">
        <div class="features__feature-icon"></div>
        <p class="features__feature-value">Терраса: нет</p>
      </div>
    </div>
  </div>
</article>
